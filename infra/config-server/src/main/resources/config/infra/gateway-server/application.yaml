spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true

      routes:
        - id: main_service_route
          uri: lb://main-service
          predicates:
            - Path=/admin/**,/compilations/**,/events/**,/categories/**,/users/**

        - id: stats_server_route
          uri: lb://stats-server
          predicates:
            - Path=/stats/**

server:
  port: ${GATEWAY_SERVER_PORT:8080}