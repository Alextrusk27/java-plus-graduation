spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false

      routes:
        - id: user_service_admin_route
          uri: lb://user-service
          predicates:
            - Path=/admin/users/**
          metadata:
            description: "Admin operations for users"

        - id: user_service_internal_route
          uri: lb://user-service
          predicates:
            - Path=/internal/users/**
          metadata:
            description: "Internal cross-service communication for users"

        - id: event_service_private_route
          uri: lb://event-service
          predicates:
            - Path=/users/{userId}/events/**
          metadata:
            description: "User-specific event operations"

        - id: event_service_public_route
          uri: lb://event-service
          predicates:
            - Path=/categories/**, /events/**, /compilations/**
          metadata:
            description: "Public event endpoints"

        - id: event_service_admin_route
          uri: lb://event-service
          predicates:
            - Path=/admin/categories/**, /admin/events/**, /admin/compilations/**
          metadata:
            description: "Admin operations for events, categories, compilations"

        - id: event_service_internal_route
          uri: lb://event-service
          predicates:
            - Path=/internal/events/**
          metadata:
            description: "Internal cross-service communication for events"

        - id: request_service_private_route
          uri: lb://request-service
          predicates:
            - Path=/users/{userId}/requests/**
          metadata:
            description: "User-specific request operations"

        - id: request_service_internal_route
          uri: lb://request-service
          predicates:
            - Path=/internal/events/requests/**
          metadata:
            description: "Internal request management"

server:
  port: ${GATEWAY_SERVER_PORT:8080}