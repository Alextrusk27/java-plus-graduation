spring:
  cloud:
    loadbalancer:
      retry:
        enabled: false

feign:
  client:
    config:
      default:
        connectTimeout: 3000
        readTimeout: 5000

resilience4j:
  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration: 500ms
        retry-exceptions:
          - ru.practicum.core.exception.ServiceUnavailableException
          - feign.RetryableException
          - java.net.ConnectException
          - java.net.SocketTimeoutException

  circuitbreaker:
    configs:
      default:
        record-exceptions:
          - ru.practicum.core.exception.ServiceUnavailableException
          - feign.RetryableException
          - java.net.ConnectException
          - java.net.SocketTimeoutException

