server:
  port: 0

spring:
  profiles:
    include:
      - db
      - http

  datasource:
    url: jdbc:postgresql://postgres:5432/requests_db

resilience4j:
  circuitbreaker:
    instances:
      event-service:
        base-config: default
      user-service:
        base-config: default

  retry:
    instances:
      event-service:
        base-config: default
      user-service:
        base-config: default

logging:
  level:
    org.springframework.cloud.loadbalancer: ERROR

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, beans