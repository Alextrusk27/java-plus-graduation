server:
  port: 0

spring:
  profiles:
    include:
      - db
      - http

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOSTNAME:localhost}:${DB_PORT:5436}/${DB_NAME:request_service_db}
    username: ${DB_USER:request}
    password: ${DB_PASSWORD:request}

resilience4j:
  circuitbreaker:
    instances:
      event-service:
        base-config: default
      user-service:
        base-config: default

  retry:
    instances:
      event-service:
        base-config: default
      user-service:
        base-config: default

logging:
  level:
    org.springframework.cloud.loadbalancer: ERROR

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, beans