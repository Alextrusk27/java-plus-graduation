spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOSTNAME:localhost}:${DB_PORT:5436}/${DB_NAME:request_service_db}
    username: ${DB_USER:request}
    password: ${DB_PASSWORD:request}

  sql:
    init:
      mode: always

  jpa:
    open-in-view: false
    properties:
      hibernate:
        ddl-auto: validate

feign:
  circuitbreaker:
    enabled: true

  client:
    config:
      event-service:
        connectTimeout: 3000
        readTimeout: 5000

resilience4j:
  circuitbreaker:
    instances:
      event-service:
        register-health-indicator: true
        sliding-window-size: 5
        minimum-number-of-calls: 5
        failure-rate-threshold: 30
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true

logging:
  level:
    feign: DEBUG
    io.github.resilience4j: DEBUG
    ru.practicum.core.feign.fallback: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: beans, health, info, metrics, circuitbreakers

  endpoint:
    beans:
      enabled: true
    health:
      show-details: always