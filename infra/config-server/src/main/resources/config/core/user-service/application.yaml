server:
  port: 0

spring:
  profiles:
    include:
      - db

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOSTNAME:localhost}:${DB_PORT:5434}/${DB_NAME:user_service_db}
    username: ${DB_USER:user}
    password: ${DB_PASSWORD:user}

logging:
  level:
    org.springframework.cloud.loadbalancer: ERROR

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, beans