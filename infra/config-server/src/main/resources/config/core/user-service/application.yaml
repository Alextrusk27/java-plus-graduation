spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOSTNAME:localhost}:${DB_PORT:5434}/${DB_NAME:user_service_db}
    username: ${DB_USER:user}
    password: ${DB_PASSWORD:user}

  sql:
    init:
      mode: always

  jpa:
    open-in-view: false
    properties:
      hibernate:
        ddl-auto: validate