spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOSTNAME:localhost}:${DB_PORT:5435}/${DB_NAME:event_service_db}
    username: ${DB_USER:event}
    password: ${DB_PASSWORD:event}

  sql:
    init:
      mode: always

  jpa:
    open-in-view: false
    properties:
      hibernate:
        ddl-auto: validate

ewm:
  stats-server:
    url: http://stats-server