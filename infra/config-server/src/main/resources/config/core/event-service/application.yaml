server:
  port: 0

spring:
  profiles:
    include:
      - db
      - http

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOSTNAME:localhost}:${DB_PORT:5435}/${DB_NAME:event_service_db}
    username: ${DB_USER:event}
    password: ${DB_PASSWORD:event}

ewm:
  stats-server:
    url: http://stats-server

resilience4j:
  circuitbreaker:
    instances:
      request-service:
        base-config: default
      user-service:
        base-config: default

  retry:
    instances:
      request-service:
        base-config: default
      user-service:
        base-config: default

logging:
  level:
    org.springframework.cloud.loadbalancer: ERROR

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, beans