spring:
  profiles:
    include: db

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOSTNAME:localhost}:${DB_PORT:5437}/${DB_NAME:comment_service_db}
    username: ${DB_USER:comment}
    password: ${DB_PASSWORD:comment}

logging:
  level:
    org.springframework.cloud.loadbalancer: ERROR

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, beans