name: explore-with-me

services:
  postgres:
    image: postgres:16.1-alpine
    restart: unless-stopped
    container_name: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./docker/postgres/init-dbs.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=ewm_postgres_db
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
    healthcheck:
      timeout: 5s
      interval: 10s
      retries: 10
      start_period: 30s
      test: [ "CMD-SHELL", "pg_isready -q -d $$POSTGRES_DB -U $$POSTGRES_USER" ]

volumes:
  postgres_data: