services:
  postgres:
    image: postgres:16.1-alpine
    restart: unless-stopped
    container_name: ewm-postgres-db
    volumes:
      - ./infra/database/init-dbs.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data/
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=ewm_postgres_db
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -q -d $$POSTGRES_DB -U $$POSTGRES_USER" ]
      timeout: 5s
      interval: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres_data:
